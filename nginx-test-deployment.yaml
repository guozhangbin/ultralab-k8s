下面是 Kubernetes 部署配置文件的示例：

```yml
# Nginx 应用部署
apiVersion: apps/v1
kind: Deployment
metadata:
 name: nginx-deployment
spec:
 replicas: 3
 selector:
 matchLabels:
 app: nginx
 template:
 metadata:
 labels:
 app: nginx
 spec:
 containers:
 - name: nginx
 image: nginx:1.19.9-alpine
 resources:
 requests:
 cpu: 100m
 memory: 128Mi
 limits:
 cpu: 200m
 memory: 256Mi
 ports:
 - containerPort: 80

# Nginx服务
apiVersion: v1
kind: Service
metadata:
 name: nginx-service
spec:
 type: NodePort
 selector:
 app: nginx
 ports:
 - port: 80
 targetPort: 80
 sessionAffinity: Client

```

###说明：

* `nginx-deployment` 部署了 Nginx 应用， replicas 为 3。
* `nginx-service` 的类型为 NodePort，可以通过指定的端口（在此示例中是 80）暴露服务给外部。 

###注意事项：

* 本文中的 YAML 文件仅是示例，不应直接应用于生产环境。
* 请确保所使用的 Docker Image 可以正确地拉取和运行。
* 该文件不包含任何自定义的环境变量或依赖关系。

如果需要更多详细信息，请访问 [Kubernetes official documentation](https://kubernetes.io/zh/docs/)。
